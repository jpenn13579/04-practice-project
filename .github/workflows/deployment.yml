name: Deploy Project
on: push
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Run lint
              run: npm lint
    test:
        needs: lint
        runs-on: ubuntu-latest
        steps: 
            - name: Get code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Run test
              run: npm test
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps: 
            - name: Get code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: npm build
            - name: Deploy
              run: echo "Deploying"
